services:

  apache:
    build: .
    container_name: webapp_apache

    ports:
      - "8080:80"

    volumes:
      - ./dev-website:/var/www/html

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: webapp_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nieuwsbrief_db

    ports:
      - "3308:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: webapp_phpmyadmin

    restart: always

    ports:
      - "8081:80"

    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root

    depends_on:
      - mysql